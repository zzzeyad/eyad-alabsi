    <h1>شروط الاستخدام</h1>

<p>باستخدامك لهذا الموقع، فإنك توافق على الالتزام بالشروط التالية:</p>

<ul>
<li>استخدام الموقع لأغراض قانونية فقط</li>
<li>عدم نسخ أو إعادة نشر المحتوى بدون إذن</li>
<li>عدم محاولة اختراق أو تعطيل الموقع</li>
</ul>

<p>نحتفظ بالحق في تعديل هذه الشروط في أي وقت دون إشعار مسبق.</p>
